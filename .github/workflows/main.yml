name: YT-DLP Isolated Test

on:
  workflow_dispatch: # Allows you to run this manually

jobs:
  test-download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Install FFmpeg (Required by yt-dlp to merge high-quality video and audio)
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Run Download Script
        run: python app.py

      # Upload the downloaded video so you can view it on your PC
      - name: Upload Video Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-youtube-video
          path: test_video.mp4
          retention-days: 1
