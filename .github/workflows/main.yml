name: Browser Scraper Test

on:
  workflow_dispatch:

jobs:
  test-download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python Dependencies & Chromium
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Web Scraper Downloader
        run: python app.py

      - name: Upload Video Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-youtube-video
          path: test_video.mp4
          retention-days: 1
