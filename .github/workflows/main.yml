name: YT-DLP Ghost Downloader

on:
  workflow_dispatch:

jobs:
  test-download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies & Nightly yt-dlp
        run: |
          pip install -r requirements.txt
          pip install --pre -U "yt-dlp[default]"

      - name: Run Ghost Downloader Script
        run: python app.py

      - name: Upload Video Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-youtube-video
          path: test_video.mp4
          retention-days: 1
